<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>תיקון Supabase</title>
<style>
body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:20px;background:#FDF6EC;color:#2C2416;}
h1{font-size:22px;}
.log{background:#fff;border:1px solid #ddd;border-radius:10px;padding:16px;margin:16px 0;font-family:monospace;font-size:13px;white-space:pre-wrap;max-height:400px;overflow-y:auto;}
.ok{color:green;font-weight:bold;}
.err{color:red;font-weight:bold;}
.warn{color:orange;}
button{background:#C9603A;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer;margin:8px 4px;}
button:hover{opacity:.9;}
</style>
</head>
<body>
<h1>🔧 דחיפת מתכונים ל-Supabase</h1>

<h3>1. בחרי קובץ גיבוי</h3>
<input type="file" accept=".json" id="fileIn" />

<h3>2. לחצי</h3>
<button onclick="pushViaAPI()">🚀 דחוף ל-Supabase</button>
<button onclick="checkViaAPI()">🔍 בדוק מה ב-Supabase</button>

<div class="log" id="log">מחכה...\n</div>

<script>
const log = (msg, cls) => {
  const el = document.getElementById('log');
  const span = document.createElement('span');
  span.className = cls || '';
  span.textContent = msg + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
};

async function checkViaAPI(){
  log('\n--- בודק Supabase ---');
  try{
    const res = await fetch('/api/config');
    const cfg = await res.json();
    log('URL: ' + cfg.supabaseUrl);
    const r2 = await fetch(
      cfg.supabaseUrl + '/rest/v1/recipes?id=eq.shared&select=data',
      { headers: { 'apikey': cfg.supabaseKey, 'Authorization': 'Bearer ' + cfg.supabaseKey } }
    );
    const d = await r2.json();
    if(d && d[0] && d[0].data){
      const recipes = JSON.parse(d[0].data);
      log('✅ ' + recipes.length + ' מתכונים בענן', 'ok');
      log('📦 ' + (d[0].data.length/1024).toFixed(0) + 'KB');
      recipes.slice(0,3).forEach(r => log('   • ' + (r.name || '?')));
    } else {
      log('⚠️ אין נתונים', 'warn');
    }
  }catch(e){
    log('❌ ' + e.message, 'err');
  }
}

async function pushViaAPI(){
  const fileIn = document.getElementById('fileIn');
  if(!fileIn.files[0]){
    log('❌ בחרי קובץ!', 'err');
    return;
  }
  log('\n--- קורא קובץ ---');
  const text = await fileIn.files[0].text();
  const recipes = JSON.parse(text);
  log('✅ ' + recipes.length + ' מתכונים', 'ok');
  log('📦 ' + (text.length/1024).toFixed(0) + 'KB');
  log('\n--- שולח דרך API שרתי ---');
  try{
    const res = await fetch('/api/push', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: text })
    });
    const result = await res.json();
    if(result.success){
      log('✅ הצלחה!', 'ok');
      log('📤 נשלחו: ' + result.sent, 'ok');
      log('✅ אומת: ' + result.verified + ' בענן', 'ok');
      log('\n🎉 עכשיו פתחי מהמובייל!', 'ok');
    } else {
      log('❌ ' + (result.error || 'שגיאה'), 'err');
      if(result.details) log(result.details, 'err');
    }
  }catch(e){
    log('❌ ' + e.message, 'err');
  }
}
</script>
</body>
</html>
